services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hyperche}
      POSTGRES_USER: ${POSTGRES_USER:-hyperche}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hyperche_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hyperche} -d ${POSTGRES_DB:-hyperche}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: web-ui/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://hyperche:${POSTGRES_PASSWORD:-hyperche_change_me}@postgres:5432/${POSTGRES_DB:-hyperche}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me-app-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:8080}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      TRIAL_DOC_LIMIT: ${TRIAL_DOC_LIMIT:-3}
      TRIAL_LLM_CALL_LIMIT: ${TRIAL_LLM_CALL_LIMIT:-50}
      TRIAL_EMBEDDING_CALL_LIMIT: ${TRIAL_EMBEDDING_CALL_LIMIT:-200}
    volumes:
      - backend_uploads:/app/uploads
      - backend_hyperrag_cache:/app/hyperrag_cache
      - backend_cograg_cache:/app/cograg_cache
      - backend_logs:/app/logs

  frontend:
    build:
      context: ./web-ui/frontend
      args:
        VITE_SERVER_URL: /api
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx.hyperche.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  backend_hyperrag_cache:
  backend_cograg_cache:
  backend_logs:
